<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis match | Đăng kí trận</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title-group">
        <span class="app-badge">Tennis match</span>
        <h1 class="screen-title">경기 등록</h1>
      </div>
      <p id="DailySubtitle" class="screen-subtitle" style="width: max-content; text-align: right;">경기 등록 정보 </p>
    </header>
    <main>
      <section class="card contact-card" style="width: 100%;">
        <form id="contactForm" class="form" style="width: 100%;">
          <div class="field" style="width: 100%; align-items: center; display: flex; flex-direction: row;">
            <label for="name" style="width: 100px;">
              당신의 이름
            </label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="입력하세요!"
              required
            />
          </div>
          <button type="submit" class="primary-button">
            경기 등록
          </button>
          <p class="form-hint">함께 신청하여 즐거운 경기!</p>
        </form>
      </section>
        <section class="card list-card" style="width: 100%; margin-top: 16px;">
          <h2 id="headerGroub" class="list-title">등록 명단</h2>
          <div id="registrationList" class="registration-list"></div>
          <button id="showCourtsBtn" class="primary-button" style="margin-top: 16px;"> 오늘 경기 매칭</button>
          <div id="courtsContainer" class="courts-container" style="display: none; margin-top: 16px;">
          </div>
      </section>
    </main>
  </div>

  <script>
    const proxyURL = "https://rough-leaf-4510.hovantan1107.workers.dev/";
    const form = document.getElementById('contactForm');
    var currentRegistrations = [];

    function renderRegistrations(list) {
      const subTitle = document.getElementById('DailySubtitle');
      if (subTitle) {
        const today = new Date();
        const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
        subTitle.textContent = `경기 등록 정보 ${today.toLocaleDateString('vi-VN', options)}`;
      }


      const container = document.getElementById('registrationList');
      if (!container) return;

      container.innerHTML = '';

      if (!list || !list.length) {
        const p = document.createElement('p');
        p.className = 'empty-text';
        p.textContent = '없습니다.';
        container.appendChild(p);
        return;
      }
      
      currentRegistrations = list;

      list.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'registration-item';
        row.style.display = 'flex';
        row.style.justifyContent = 'right';
        row.style.alignItems = 'center';


        const nameEl = document.createElement('div');
        nameEl.className = 'registration-name';
        nameEl.textContent = item.name;
        nameEl.style.flex = '1';

        const timeEl = document.createElement('div');
        timeEl.className = 'registration-time';
        if (item.createdAt) {
          const dt = new Date(item.createdAt);
          if (!Number.isNaN(dt.valueOf())) {
            timeEl.textContent = dt.toLocaleString('vi-VN');
            timeEl.align = 'right';
          }
        } 
        const sanE1 = document.createElement('div');
        sanE1.className = 'registration-san';
        sanE1.textContent = item.san || '-';
        sanE1.align = 'right';
        sanE1.style.marginLeft = '16px';

        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'primary-button';
        cancelBtn.textContent = '취소';
        cancelBtn.style.height = '30px';
        cancelBtn.style.width = '60px';
        cancelBtn.style.padding = '0 5px';

        cancelBtn.addEventListener('click', () => {
          if (confirm(`정말로 ${item.name}의 등록을 취소하시겠습니까?`)) {
            fetch(proxyURL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'delete', name: item.name }),
            })
              .then((response) => response.text())
              .then((result) => {
                alert(' 등록이 취소되었습니다: ' + item.name);
                loadRegistrations();
              })
              .catch((error) => {
                console.error('Error!', error);
                alert('등록 취소 실패, 다시 시도해주세요.');
              });
          }
        });

        row.appendChild(nameEl);
        row.appendChild(timeEl);
        row.appendChild(sanE1);
        row.appendChild(cancelBtn);
        container.appendChild(row);
      });
    }

    async function loadRegistrations() {
      const headerGroup = document.getElementById('headerGroub');
      try {
        if (headerGroup) {
          headerGroup.textContent = '등록 명단을 불러오는 중...';
        }
        const response = await fetch(proxyURL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'list' }),
        });
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        const data = await response.json();
        console.log('등록 명단이 불러와졌습니다:', data);
        const list = Array.isArray(data.items) ? data.items : data;
        currentRegistrations = list;
        renderRegistrations(list);
        renderCourts();
      } catch (error) {
        console.error('등록 명단을 불러오지 못했습니다:', error);
        renderRegistrations([]);
        renderCourts();
      } 
      finally {
        headerGroup.textContent = '등록 명단';
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const submitButton = form.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = '전송 중...';

      const payload = {
        name: form.name.value
      };

      fetch(proxyURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      })
        .then((response) => response.text())
        .then((result) => {
          form.reset();
          submitButton.disabled = false;
          submitButton.textContent = '경기 등록';
          return loadRegistrations();
        })
        .catch((error) => {
          console.error('Error!', error);
          alert('실패 : 오류가 발생했습니다. 다시 시도해주세요.');
        })
        .finally(() => {
          submitButton.disabled = false;
          submitButton.textContent = '경기 등록';
        });
    });
    
    document.getElementById("showCourtsBtn").addEventListener("click", function() {
      const courtsContainer = document.getElementById('courtsContainer');
      if (courtsContainer.style.display === 'none') {
        courtsContainer.style.display = 'block';
        this.textContent = '경기 매칭 숨기기';
        renderCourts();
      } else {
        courtsContainer.style.display = 'none';
        this.textContent = '오늘 경기 매칭';
      }
    });

    function renderCourts() {
      const courtsContainer = document.getElementById("courtsContainer");
      courtsContainer.style.display = "grid";
      courtsContainer.innerHTML = "";
      
      // Tạo 4 sân tennis viết tên người chơi vào mỗi sân theo danh sách đăng kí với 
      // sân đấu được gắn trong item.san
      const registrations = currentRegistrations || [];
      
      // Debug: in ra dữ liệu để kiểm tra
      console.log('Registrations:', registrations);
      console.log('Number of players:', registrations.length);
      
      for (let i = 1; i <= 4; i++) {
        const courtDiv = document.createElement("div");
        courtDiv.className = "court";
        
        // Lấy danh sách người chơi cho sân này (so sánh linh hoạt)
        const players = registrations.filter(r => {
          const courtNum = r.san ? String(r.san).trim() : '';
          return courtNum === String(i);
        });
        
        console.log(`Court ${i} players:`, players);
        
        const player1 = players[0]?.name || '...';
        const player2 = players[1]?.name || '...';
        
        // Tạo các phần tử con cho sân tennis
        courtDiv.innerHTML = `
          <div class="texture"></div>
          <div class="singles"></div>
          <div class="baseline-top"></div>
          <div class="baseline-bottom"></div>
          <div class="service-top"></div>
          <div class="service-bottom"></div>
          <div class="center-service"></div>
          <div class="center-mark-top"></div>
          <div class="center-mark-bottom"></div>
          <div class="net"></div>
          <div class="court-label">경기장 ${i}</div>
          <div class="player-1">${player1}</div>
          <div class="player-2">${player2}</div>
        `;
        
        courtsContainer.appendChild(courtDiv);
      }
    }
    // Tải danh sách đăng kí từ Google Sheet khi mở trang
    loadRegistrations();
  </script>
</body>
 </html>
